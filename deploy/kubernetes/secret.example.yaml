# Example secret. Do NOT commit real values: create the secret out-of-band
# (e.g. `kubectl create secret generic fraud-api-secrets --from-literal=...`)
# or manage it with a sealed-secrets / external-secrets operator.
apiVersion: v1
kind: Secret
metadata:
  name: fraud-api-secrets
  labels:
    app: fraud-api
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/fraud"
  API_KEY: "replace-with-strong-api-key"
  JWT_SECRET: "replace-with-strong-jwt-secret"
  BOOTSTRAP_ADMIN_PASSWORD: "replace-with-strong-admin-password"
