apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api
  labels:
    app: fraud-api
spec:
  # Keep at 1 if relying on the in-process scheduler (drift reports, retention).
  # To scale the API horizontally, disable in-process scheduling here and run a
  # single-replica scheduler Deployment or a CronJob instead.
  replicas: 1
  selector:
    matchLabels:
      app: fraud-api
  template:
    metadata:
      labels:
        app: fraud-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: fraud-api:latest # Replace with <registry>/fraud-api:<git-sha>.
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fraud-api-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fraud-api-secrets
                  key: DATABASE_URL
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: fraud-api-secrets
                  key: API_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fraud-api-secrets
                  key: JWT_SECRET
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fraud-api-secrets
                  key: BOOTSTRAP_ADMIN_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
