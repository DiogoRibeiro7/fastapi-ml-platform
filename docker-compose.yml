services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      API_KEY: dev-api-key
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      MODEL_ARTIFACT_PATH: artifacts/fraud_model.joblib
      MODEL_METADATA_PATH: artifacts/fraud_model_metadata.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
