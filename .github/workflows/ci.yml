name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fraud
          POSTGRES_PASSWORD: fraud
          POSTGRES_DB: fraud
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app

      - name: Test (with coverage and PostgreSQL integration)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://fraud:fraud@localhost:5432/fraud
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pip-audit

      - name: Audit dependencies for known vulnerabilities (advisory)
        continue-on-error: true
        run: pip-audit
